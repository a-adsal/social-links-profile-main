<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    >
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main>
      <section class="social-link">
        <div class="container">
          <div class="card">
          <figure class="social-link__figure">
            <img
              src="assets/images/avatar-jessica.jpeg"
              alt="Jessica Randall"
              class="social-link__img"
            >
            <figcaption>
              <div class="title__wrapper">
                <h1 class="title">Jessica Randall</h1>
                <p class="lead">London, United Kingdom</p>
              </div>
              <q>Front-end developer and avid reader.</q>
            </figcaption>
          </figure>
          <nav class="social-link__nav">
            <ul class="social-link__list">
              <li class="social-link__item">
                <a href="#" class="btn--primary">GitHub</a>
              </li>
              <li class="social-link__item">
                <a href="#" class="btn--primary">Frontend Mentor</a>
              </li>
              <li class="social-link__item">
                <a href="#" class="btn--primary">LinkedIn</a>
              </li>
              <li class="social-link__item">
                <a href="#" class="btn--primary">Twitter</a>
              </li>
              <li class="social-link__item">
                <a href="#" class="btn--primary">Instagram</a>
              </li>
            </ul>
          </nav>
        </div>
        </div>
      </section>
    </main>
    <footer class="attribution">
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="https://github.com/a-adsal/" target="_blank">Adsal</a>.
      </p>
    </footer>
  </body>
</html>
